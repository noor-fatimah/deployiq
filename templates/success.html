<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — DeployIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #060d1a; color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #0d1f35;
      border: 1px solid #166534;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px; width: 100%;
      text-align: center;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop {
      from { opacity:0; transform: scale(0.85); }
      to   { opacity:1; transform: scale(1); }
    }
    .icon { font-size: 72px; margin-bottom: 24px; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      color: #22c55e; margin-bottom: 12px;
      letter-spacing: -1px;
    }
    p { color: #94a3b8; font-size: 16px; line-height: 1.7; margin-bottom: 8px; }
    .note {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px; padding: 16px;
      color: #86efac; font-size: 14px;
      margin: 24px 0;
    }
    .btn {
      display: inline-block;
      background: #38bdf8; color: #060d1a;
      padding: 14px 32px; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 700;
      text-decoration: none; margin-top: 8px;
      transition: all 0.2s;
    }
    .btn:hover { background: #7dd3fc; box-shadow: 0 6px 24px rgba(56,189,248,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're all set!</h1>
    <p>Your payment was successful. Welcome to DeployIQ Forever.</p>
    <div class="note">
      📧 Check your email for your access link.<br>
      Unlimited reports. No expiry. Ever.
    </div>
    <p style="font-size:13px;color:#475569;">
      Didn't receive an email? Check spam or contact support.
    </p>
    <br>
    <a href="{{ agent_url }}" class="btn">Open DeployIQ →</a>
  </div>
</body>
</html>
